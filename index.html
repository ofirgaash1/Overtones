<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harmonic Synth - with Waveform + Spectrogram</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="wrap">
    <div class="card" role="group" aria-label="Harmonic Synth">
      <h1>Harmonic Synth</h1>

      <!-- TOP: Waveform + Spectrogram -->
      <div class="strip" id="strip">
        <canvas id="spectrogram"></canvas>
        <canvas id="wave"></canvas>
      </div>
      <div id="resizer" class="resize-bar" title="Drag to change analyzer height"></div>

      <div class="actions">
        <button id="togglePlay">Play</button>
        <button id="presetSaw" class="secondary" title="1/n across harmonics">Saw 1/n</button>
        <button id="presetSquare" class="secondary" title="Odd-only 1/n">Square 1/n (odd)</button>
        <span class="note" id="countNote"></span>
      </div>

      <details id="groupsPanel">
        <summary><span class="twisty" aria-hidden="true"></span><strong>Note groups (octaves by odd base)</strong>
        </summary>
        <div class="groups-toolbar">
          <button id="groupsToggleAll" class="success" title="Toggle all note groups">Untick all</button>
        </div>
        <div id="groups"></div>
      </details>

      <div class="controls">
        <div class="row">
          <label for="freqSlider">Fundamental (Hz)</label>
          <input id="freqSlider" type="range" min="0" max="1" step="0.0001" />
          <input id="freqNum" type="number" min="20" max="20000" step="1" value="80" />
        </div>
        <div class="row">
          <label for="master">Master (Sum Amp %)</label>
          <input id="master" type="range" min="0" max="100" step="0.01" value="40" />
          <div class="out" id="masterOut">100.00% (Sum Amp)</div>
        </div>
      </div>

      <div class="bank" id="bank" aria-live="polite" aria-label="Harmonic controls (Amp sliders; Coeff are weights)">
      </div>

      <details class="tests" id="testsPanel">
        <summary>Developer tests</summary>
        <pre id="tests"></pre>
      </details>
    </div>
  </div>

    <script src="app.js"></script>
</body>

</html>
